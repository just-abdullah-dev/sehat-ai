services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    environment:
      DEBUG: "True"
    volumes:
      - ./app:/app/app
      - ./ml_models:/app/ml_models
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./logs:/app/logs
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
