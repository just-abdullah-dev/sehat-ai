services:
  db:
    image: postgres:15-alpine
    container_name: sehatai_db
    environment:
      POSTGRES_USER: sehatai_user
      POSTGRES_PASSWORD: sehatai_password
      POSTGRES_DB: sehatai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sehatai_user -d sehatai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sehatai_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sehatai_user:sehatai_password@db:5432/sehatai_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-key-change-this}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      DEBUG: ${DEBUG:-False}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:19006}
      TB_MODEL_PATH: ${TB_MODEL_PATH:-ml_models/tb_detection_model_97.h5}
      TB_MODEL_METADATA_PATH: ${TB_MODEL_METADATA_PATH:-ml_models/tb_detection_metadata.json}
      PNEUMONIA_MODEL_PATH: ${PNEUMONIA_MODEL_PATH:-ml_models/pneumonia_efficientnetb3_94.keras}
      PNEUMONIA_MODEL_METADATA_PATH: ${PNEUMONIA_MODEL_METADATA_PATH:-ml_models/pneumonia_detection_metadata.json}
      CHEST_XRAY_VALIDATOR_MODEL_PATH: ${CHEST_XRAY_VALIDATOR_MODEL_PATH:-ml_models/chest_xray_validator.h5}
      CHEST_XRAY_VALIDATOR_METADATA_PATH: ${CHEST_XRAY_VALIDATOR_METADATA_PATH:-ml_models/chest_xray_validator_metadata.json}
      PORT: ${PORT:-8000}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    volumes:
      - ./ml_models:/app/ml_models
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
